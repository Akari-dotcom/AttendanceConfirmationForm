<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>出欠確認一覧</title>
</head>
<body>
    <h1>出欠確認一覧</h1>
    <input type="text" id="dateFilter" placeholder="日付（例: 4月19日）">
    <input type="text" id="timeFilter" placeholder="時間帯（朝/夜）">
    <button onclick="filterData()">検索</button>
    <div id="result"></div>

    <script>
        async function filterData() {
            // ★ここに同じGASのURLを貼り付ける
            const url = 'https://script.google.com/macros/s/AKfycbyzwoscCnNWQnSqoug6dtOZMOMHwNxIKWAnyHj_D5-A012prCEceK8dS-DWYADRsEsd/exec';
            const res = await fetch(url);
            const data = await res.json();
            
            const date = document.getElementById('dateFilter').value;
            const time = document.getElementById('timeFilter').value;
            
            const filtered = data.filter(r => r === date && r === time);
            
            let html = '<table border="1"><tr><th>名前</th><th>ステータス</th><th>備考</th></tr>';
            filtered.forEach(r => {
                html += `<tr><td>${r}</td><td>${r}</td><td>${r}</td></tr>`;
            });
            document.getElementById('result').innerHTML = html + '</table>';
        }
    </script>
</body>
</html>
