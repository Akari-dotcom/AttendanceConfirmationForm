<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8"><title>出欠確認</title></head>
<body>
    <h1>出欠確認フォーム</h1>
    <form id="attendanceForm">
        <input type="text" id="name" placeholder="名前" required><br>
        <select id="status"><option>出席</option><option>欠席</option></select><br>
        <input type="text" id="memo" placeholder="備考"><br>
        <button type="submit">送信</button>
    </form>
    <script>
        document.getElementById('attendanceForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const url = 'YOUR_GAS_WEB_APP_URL';
            const params = new URLSearchParams();
            params.append('name', document.getElementById('name').value);
            params.append('status', document.getElementById('status').value);
            params.append('memo', document.getElementById('memo').value);
            fetch(url, {
                method: 'POST',
                // mode: 'no-cors', // 一旦コメントアウト、または削除
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, // フォーム形式を指定
                body: params
            })
            .then(() => { alert('送信完了しました！'); document.getElementById('attendanceForm').reset(); });
        });
    </script>
</body>
</html>
