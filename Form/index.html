<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>出欠確認フォーム</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        form { display: flex; flex-direction: column; gap: 10px; max-width: 300px; }
    </style>
</head>
<body>
    <h1>出欠確認フォーム</h1>
    <form id="attendanceForm">
        <input type="text" id="name" placeholder="お名前" required>
        <select id="status">
            <option value="出席">出席</option>
            <option value="欠席">欠席</option>
        </select>
        <input type="text" id="memo" placeholder="備考">
        <button type="submit">送信</button>
    </form>

    <script>
        document.getElementById('attendanceForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // ★ここにGASで発行したURLを貼り付ける
            const url = 'https://script.google.com/macros/s/AKfycbzJxFrqVi5grFmu-k5oFLzrvg-lt22Hg2Jk5sKMturn8rgAm74_-RWgX3MwTBb1bBRk/exec';
            
            const data = {
                name: document.getElementById('name').value,
                status: document.getElementById('status').value,
                memo: document.getElementById('memo').value
            };

            fetch(url, {
                method: 'POST',
                body: JSON.stringify(data)
            }).then(() => {
                alert('送信完了しました！');
                document.getElementById('attendanceForm').reset();
            });
        });
    </script>
</body>
</html>
